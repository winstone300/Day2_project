stages:
  - test

backend-test:
  stage: test
  image: python:3.12-slim
  before_script:
    - python -m pip install --no-cache-dir -r backend/requirements-dev.txt
  script:
    - cd backend
    - python -m unittest discover -s tests -v

frontend-build:
  stage: test
  image: node:22-slim
  before_script:
    - corepack enable
    - cd frontend
    - pnpm install --frozen-lockfile
  script:
    - pnpm run build
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - frontend/dist/
