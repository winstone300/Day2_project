services:
  - type: web
    name: localhub-api
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        value: sqlite:////tmp/localhub.db
      - key: SEOUL_DATA_DIR
        value: ./data/seoul
      - key: CORS_ORIGINS
        sync: false
